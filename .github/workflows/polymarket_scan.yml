name: generate-world-recreation-short

on:
  workflow_dispatch:
    inputs:
      type:
        description: "Topic type: anime, historical, or leave empty for random"
        required: false
        default: ""
      num_clips:
        description: "Number of clips per video (3-8)"
        required: false
        default: "5"
      batch:
        description: "Number of videos to generate (1-3)"
        required: false
        default: "1"
  # DISABLED: Uncomment after channel is validated
  # schedule:
  #   - cron: "0 */12 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate API keys
        run: |
          test -n "${{ secrets.DEEPSEEK_API_KEY }}" || { echo "::error::Missing DEEPSEEK_API_KEY"; exit 1; }
          test -n "${{ secrets.ELEVENLABS_API_KEY }}" || { echo "::error::Missing ELEVENLABS_API_KEY"; exit 1; }
          test -n "${{ secrets.FAL_KEY }}" || { echo "::error::Missing FAL_KEY"; exit 1; }

      - name: Generate world recreation short
        timeout-minutes: 35
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          TYPE_ARG=""
          if [ -n "${{ github.event.inputs.type }}" ]; then
            TYPE_ARG="--type ${{ github.event.inputs.type }}"
          fi

          if [ "${{ github.event.inputs.batch || '1' }}" != "1" ]; then
            python pipeline.py \
              --batch ${{ github.event.inputs.batch }} \
              --num-clips ${{ github.event.inputs.num_clips || '5' }} \
              $TYPE_ARG \
              --verbose
          else
            python pipeline.py \
              --num-clips ${{ github.event.inputs.num_clips || '5' }} \
              $TYPE_ARG \
              --verbose
          fi

      - name: Upload generated video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-short-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 30
          if-no-files-found: warn
