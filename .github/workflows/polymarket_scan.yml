name: generate-lifehack-short

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Life hack topic (e.g., kitchen, cleaning, food storage)"
        required: false
        default: "kitchen and household"
      num_hacks:
        description: "Number of hacks per video (2-4)"
        required: false
        default: "3"
  schedule:
    - cron: "0 */12 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate life-hack short video
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          ELEVENLABS_VOICE_ID_FEMALE: ${{ secrets.ELEVENLABS_VOICE_ID_FEMALE }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          python pipeline.py \
            --topic "${{ github.event.inputs.topic || 'kitchen and household' }}" \
            --num-hacks ${{ github.event.inputs.num_hacks || '3' }} \
            --verbose

      - name: Upload generated video
        uses: actions/upload-artifact@v4
        with:
          name: lifehack-short-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 30
