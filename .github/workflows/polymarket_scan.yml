name: generate-satisfying-short

on:
  workflow_dispatch:
    inputs:
      theme:
        description: "Visual theme (e.g., glass and crystal, liquid metal, surreal physics)"
        required: false
        default: "surreal physics"
      num_clips:
        description: "Number of clips per video (2-5)"
        required: false
        default: "3"
      batch:
        description: "Number of separate videos to generate (1-5)"
        required: false
        default: "1"
  # DISABLED: Do not auto-run until monetization is live.
  # Uncomment the schedule below only after the channel is validated and earning.
  # schedule:
  #   - cron: "0 */12 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate API keys exist
        run: |
          test -n "${{ secrets.DEEPSEEK_API_KEY }}" || { echo "::error::Missing DEEPSEEK_API_KEY secret"; exit 1; }
          test -n "${{ secrets.ELEVENLABS_API_KEY }}" || { echo "::error::Missing ELEVENLABS_API_KEY secret"; exit 1; }
          test -n "${{ secrets.FAL_KEY }}" || { echo "::error::Missing FAL_KEY secret"; exit 1; }

      - name: Generate satisfying short video
        timeout-minutes: 25
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          if [ "${{ github.event.inputs.batch || '1' }}" != "1" ]; then
            python pipeline.py \
              --batch ${{ github.event.inputs.batch }} \
              --num-clips ${{ github.event.inputs.num_clips || '3' }} \
              --verbose
          else
            python pipeline.py \
              --theme "${{ github.event.inputs.theme || 'surreal physics' }}" \
              --num-clips ${{ github.event.inputs.num_clips || '3' }} \
              --verbose
          fi

      - name: Upload generated video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: satisfying-short-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 30
          if-no-files-found: warn
