name: generate-construction-timelapse-prompts

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "template"
        type: choice
        options:
          - template
          - offline
          - dry-run
      template_type:
        description: "Force specific template (leave empty for random lottery)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - pool_vehicle
          - resin_table
          - fiber_optic_floor
          - garden_strip
          - pool_megastructure
  schedule:
    - cron: "0 */12 * * *"

jobs:
  generate-prompts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate Kling 3.0 prompts
        timeout-minutes: 5
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'template' }}"
          TEMPLATE="${{ github.event.inputs.template_type }}"

          if [ "$MODE" = "template" ]; then
            if [ -n "$TEMPLATE" ]; then
              python build_pipeline.py --force-template "$TEMPLATE" --verbose
            else
              python build_pipeline.py --template --verbose
            fi
          elif [ "$MODE" = "offline" ]; then
            python build_pipeline.py --offline --verbose
          else
            python build_pipeline.py --dry-run --verbose
          fi

      - name: Upload prompt output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kling-prompts-${{ github.run_number }}
          path: |
            output/*.json
          retention-days: 30
          if-no-files-found: warn
