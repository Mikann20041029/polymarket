name: generate-construction-timelapse-short

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: offline (no API), dry-run (LLM only), generate (full)"
        required: false
        default: "generate"
        type: choice
        options:
          - offline
          - dry-run
          - generate
  schedule:
    - cron: "0 */12 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate API keys
        if: ${{ github.event.inputs.mode != 'offline' }}
        run: |
          test -n "${{ secrets.DEEPSEEK_API_KEY }}" || { echo "::error::Missing DEEPSEEK_API_KEY"; exit 1; }
          if [ "${{ github.event.inputs.mode || 'generate' }}" = "generate" ]; then
            test -n "${{ secrets.FAL_KEY }}" || { echo "::error::Missing FAL_KEY (needed for video generation)"; exit 1; }
            test -n "${{ secrets.ELEVENLABS_API_KEY }}" || { echo "::error::Missing ELEVENLABS_API_KEY (needed for SFX)"; exit 1; }
          fi

      - name: Generate construction timelapse short
        timeout-minutes: 35
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          MODE="${{ github.event.inputs.mode || 'generate' }}"
          if [ "$MODE" = "offline" ]; then
            python build_pipeline.py --offline --verbose
          elif [ "$MODE" = "generate" ]; then
            python build_pipeline.py --generate --verbose
          else
            python build_pipeline.py --dry-run --verbose
          fi

      - name: Upload generated video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-short-${{ github.run_number }}
          path: |
            output/*.mp4
            output/*.json
          retention-days: 30
          if-no-files-found: warn
