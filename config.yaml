# Witness-type Shock Video Generation System
# All settings for scenario generation, scoring, and filtering

# ── Generation ───────────────────────────────────────────
# 1 video = 1 scene = 1 single continuous clip (NO multi-clip)
generation:
  candidates_per_template: 3       # scenarios per hook template
  min_hook_templates: 10           # buzz structure templates per run
  min_total_candidates: 30         # minimum candidates before filtering
  duration_seconds: 14             # single clip length (10-15s range)
  min_duration_seconds: 10
  max_duration_seconds: 15

# ── Scene Time Structure ────────────────────────────────
# All within ONE continuous clip. No cuts.
# 0.0-1.0s : anomaly already visible
# 1.0-5.0s : viewer understands what's happening
# 5.0-10.0s: peak intensity
# 10.0-15.0s: aftermath / lingering余韻
time_structure:
  anomaly_visible_by: 0.5          # seconds - anomaly MUST be on screen
  understanding_by: 3.0            # seconds - situation fully clear
  peak_start: 5.0
  peak_end: 10.0
  aftermath_start: 10.0

# ── LLM ──────────────────────────────────────────────────
llm:
  provider: "deepseek"
  model: "deepseek-chat"
  base_url: "https://api.deepseek.com"
  max_tokens: 8192
  temperature: 0.9                 # high creativity for candidates
  scoring_temperature: 0.3         # low randomness for scoring

# ── Similarity Filter ────────────────────────────────────
similarity:
  threshold: 0.45                  # above this = too similar, reject
  history_lookback: 50             # compare against last N videos
  hard_filters:
    same_event_type_last_n: 5      # no same event_type in last 5
    same_pov_last_n: 3             # no same camera_pov in last 3
    same_hook_last_n: 3            # no same opening_hook in last 3
    same_category_max_in_last_n: 3 # max times a category appears in last 10
    same_category_window: 10
  weights:
    event_type: 0.15
    scenario_summary: 0.15
    location_style: 0.08
    camera_pov: 0.12
    opening_hook_type: 0.15
    escalation_pattern: 0.10
    climax_type: 0.10
    aftermath_type: 0.05
    visual_tags: 0.05
    tone_tags: 0.05

# ── Buzz Scoring ─────────────────────────────────────────
scoring:
  min_total_score: 45              # out of 70, below = reject
  min_hook_score: 7                # first_second_shock minimum (out of 10)
  min_clarity_score: 7             # instant_clarity minimum - "think to understand" = reject
  criteria:
    - name: "first_second_shock"
      weight: 1
      description: "Does the first frame (0.5s) make viewers stop scrolling?"
    - name: "instant_clarity"
      weight: 1
      description: "Can viewers understand what's happening without thinking? No ambiguity."
    - name: "scale_impact"
      weight: 1
      description: "Is the scale dramatic - giant objects, vast phenomena, human contrast?"
    - name: "realism_potential"
      weight: 1
      description: "Can a 10-15s AI video clip render this as one continuous shot convincingly?"
    - name: "curiosity_gap"
      weight: 1
      description: "Will viewers wonder 'where is this?' or 'is this real?'"
    - name: "uniqueness"
      weight: 1
      description: "Is this unlike anything commonly seen on YouTube/TikTok?"
    - name: "replay_potential"
      weight: 1
      description: "Will viewers want to watch again or show someone?"

# ── Category Balance ─────────────────────────────────────
categories:
  natural_phenomenon:
    label: "Natural Phenomenon"
    target_ratio: 0.12
    examples: ["earthquake", "tsunami", "volcanic eruption", "sinkhole", "avalanche", "waterspout"]
  urban_anomaly:
    label: "Urban Anomaly"
    target_ratio: 0.12
    examples: ["crane collapse", "dust devil in city", "building sway", "gas explosion aftermath"]
  animal_encounter:
    label: "Animal Encounter"
    target_ratio: 0.11
    examples: ["bear charge", "shark near-miss", "elephant confrontation", "whale breach"]
  maritime_anomaly:
    label: "Maritime Anomaly"
    target_ratio: 0.12
    examples: ["ship near-miss", "rogue wave", "whirlpool formation", "port accident"]
  aviation_anomaly:
    label: "Aviation Anomaly"
    target_ratio: 0.11
    examples: ["low flyover", "emergency landing", "near-miss", "cargo drop"]
  traffic_transport:
    label: "Traffic & Transport"
    target_ratio: 0.11
    examples: ["road collapse", "flash flood on highway", "train derailment", "tunnel flood"]
  infrastructure_failure:
    label: "Infrastructure Failure"
    target_ratio: 0.10
    examples: ["dam overflow", "bridge cable snap", "tunnel collapse", "power grid failure"]
  space_sky_anomaly:
    label: "Space & Sky Anomaly"
    target_ratio: 0.10
    examples: ["meteor fireball", "unexplained lights", "aurora anomaly", "atmospheric phenomenon"]
  realistic_whatif:
    label: "Realistic What-If"
    target_ratio: 0.11
    examples: ["rogue wave hits restaurant", "ice shelf collapse near boat", "sinkhole under building"]

# ── Camera POVs ──────────────────────────────────────────
camera_povs:
  balcony:
    label: "Balcony / Rooftop"
    description: "Fixed elevated viewpoint looking out over city/landscape"
    compatible_categories: ["urban_anomaly", "natural_phenomenon", "aviation_anomaly", "space_sky_anomaly"]
    camera_traits: "fixed or near-fixed, slight handheld tremor, ambient room sounds"
  street:
    label: "Street / Pedestrian"
    description: "Ground-level, person standing still or stopped, phone held up"
    compatible_categories: ["urban_anomaly", "natural_phenomenon", "aviation_anomaly", "infrastructure_failure"]
    camera_traits: "fixed vertical phone, minimal movement, crowd murmur"
  dashcam:
    label: "Car Dashcam / Interior"
    description: "Fixed dashboard camera or phone mounted on windshield"
    compatible_categories: ["traffic_transport", "natural_phenomenon", "infrastructure_failure", "aviation_anomaly"]
    camera_traits: "fixed angle, engine hum, windshield frame visible"
  boat:
    label: "Boat / Ship Deck"
    description: "Fixed viewpoint from boat deck, natural water sway only"
    compatible_categories: ["maritime_anomaly", "animal_encounter", "natural_phenomenon"]
    camera_traits: "fixed position, gentle sway from waves, wind noise, water ambient"
  drone:
    label: "Drone / Aerial"
    description: "High-angle aerial, stable hover or very slow drift"
    compatible_categories: ["natural_phenomenon", "urban_anomaly", "infrastructure_failure", "maritime_anomaly"]
    camera_traits: "stable hover, wide angle, minimal movement, high altitude wind"
  tourist:
    label: "Tourist / Bystander"
    description: "Person stopped, holding phone up to record, near-fixed"
    compatible_categories: ["natural_phenomenon", "urban_anomaly", "animal_encounter", "maritime_anomaly", "realistic_whatif"]
    camera_traits: "vertical phone, near-fixed, slight hand tremor, ambient gasps"
  mountain:
    label: "Mountain / Hiking Trail"
    description: "Fixed viewpoint from trail, overlook, or campsite"
    compatible_categories: ["natural_phenomenon", "animal_encounter", "traffic_transport"]
    camera_traits: "fixed position, wind, distant nature sounds"
  airport:
    label: "Airport Vicinity"
    description: "Fixed viewpoint near runway or through terminal window"
    compatible_categories: ["aviation_anomaly"]
    camera_traits: "fixed angle, jet engine roar, fence or glass frame visible"
  underwater_surface:
    label: "Water Surface / Kayak"
    description: "At water level, fixed GoPro mount or held camera"
    compatible_categories: ["maritime_anomaly", "animal_encounter", "natural_phenomenon"]
    camera_traits: "fixed mount, water on lens, bobbing from waves, splashing"
  interior:
    label: "Indoor / Window View"
    description: "Fixed viewpoint looking out through window or glass"
    compatible_categories: ["urban_anomaly", "natural_phenomenon", "infrastructure_failure", "realistic_whatif", "space_sky_anomaly"]
    camera_traits: "fixed through glass, reflection visible, muffled exterior, interior ambient"

# ── Hook Templates ───────────────────────────────────────
# These are "buzz structure templates" - the FIRST thing decided before scenario
hook_templates:
  - id: "massive_object_too_close"
    label: "Massive Object Already Too Close"
    description: "Frame opens with a giant object/entity filling 60-80% of frame, impossibly close"
    first_frame: "Giant object dominates the frame, dwarfing everything else"
    min_shock_score: 8

  - id: "collapse_already_started"
    label: "Collapse Already In Progress"
    description: "Something massive is already crumbling/falling/breaking when video starts"
    first_frame: "Debris falling, structure tilting, ground splitting - mid-event"
    min_shock_score: 8

  - id: "fleeing_pov"
    label: "Running Away From Something"
    description: "Camera is already in motion, person clearly fleeing from danger behind"
    first_frame: "Bouncing camera, heavy breathing, danger visible behind/reflected"
    min_shock_score: 7
    note: "Camera must be mostly fixed/minimal movement per single-scene rule - show fleeing people FROM a fixed vantage"

  - id: "impossible_sky"
    label: "Something Wrong in the Sky"
    description: "Camera looks up and something impossible/terrifying is in the sky"
    first_frame: "Sky filled with anomalous object, light, or formation"
    min_shock_score: 7

  - id: "water_wrong"
    label: "Water Behaving Impossibly"
    description: "Water is doing something it shouldn't - rising, spinning, retreating, surging"
    first_frame: "Water mass moving unnaturally, defying expectations"
    min_shock_score: 7

  - id: "sound_before_sight"
    label: "Terrifying Sound Then Reveal"
    description: "Opens with alarming audio (rumble, roar, siren) - anomaly source already partially visible"
    first_frame: "Anomaly source visible at edge of frame with dominant alarming audio"
    min_shock_score: 7
    note: "Anomaly must be VISIBLE within 0.5s - pure audio delay is not allowed"

  - id: "scale_reveal"
    label: "Sudden Scale Revelation"
    description: "Something ordinary is revealed to be impossibly large or close via size comparison"
    first_frame: "Familiar object then a human/car enters frame showing insane scale contrast"
    min_shock_score: 8

  - id: "calm_then_crack"
    label: "Perfect Calm Broken by Anomaly"
    description: "Seemingly calm scene but ONE wrong detail is already visible from frame 1"
    first_frame: "Beautiful but one visible anomaly - crack, shadow, movement that shouldn't be there"
    min_shock_score: 7
    note: "The anomaly must be visible at 0.5s, not 'appearing later'"

  - id: "crowd_panic"
    label: "Crowd Already Reacting"
    description: "People are already screaming/running/pointing, cause visible in frame"
    first_frame: "Panicked crowd AND the cause both visible from the start"
    min_shock_score: 7
    note: "Both the crowd reaction AND the anomaly must be visible within 0.5s"

  - id: "animal_proximity"
    label: "Dangerous Animal Impossibly Close"
    description: "Dangerous animal is already within striking distance when video starts"
    first_frame: "Animal fills significant portion of frame, immediate threat apparent"
    min_shock_score: 8

# ── Dry Run ──────────────────────────────────────────────
dry_run: true  # NEVER auto-generate paid content. Set false only after explicit approval.

# ── Video Generation (locked behind dry_run) ─────────────
# 1 video = 1 clip = 10-15 seconds
video:
  model: "wan-2.1"
  resolution: "480p"
  max_cost_per_video_usd: 0.35   # ~50 JPY hard ceiling (1 clip + SFX + LLM)

# ── Output ───────────────────────────────────────────────
output:
  directory: "output"
  filename_prefix: "witness"
