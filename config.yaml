# Construction Timelapse Luxury Space Transformation System
# rebornspacestv-style: construction process + luxury reveal shorts

# ── Generation ───────────────────────────────────────────
# 1 video = 1 continuous 15-second timelapse clip
generation:
  candidates_per_template: 3       # scenarios per concept template
  min_concept_templates: 10        # concept templates per run
  min_total_candidates: 30
  duration_seconds: 15
  min_duration_seconds: 10
  max_duration_seconds: 15

# ── Video Time Structure ─────────────────────────────────
# Construction timelapse progression within ONE 15s clip:
time_structure:
  before_show: 1.0          # 0-1s: original space clearly visible
  construction_start: 4.0   # 1-4s: excavation/demolition/first work
  main_build: 10.0          # 4-10s: major structural changes
  reveal_start: 10.0        # 10-15s: finishing + completion reveal

# ── LLM ──────────────────────────────────────────────────
llm:
  provider: "deepseek"
  model: "deepseek-chat"
  base_url: "https://api.deepseek.com"
  max_tokens: 8192
  temperature: 0.9
  scoring_temperature: 0.3

# ── Similarity Filter ────────────────────────────────────
similarity:
  threshold: 0.40
  history_lookback: 50
  hard_filters:
    same_category_last_n: 3
    same_construction_type_last_n: 5
    same_reveal_type_last_n: 3
    same_after_space_last_n: 5
    consecutive_excavation_max: 3
    consecutive_water_element_max: 3
  weights:
    concept: 0.35
    process: 0.35
    completion: 0.30

# ── Scoring ──────────────────────────────────────────────
scoring:
  min_total_score: 50            # out of 80
  min_concept_score: 7           # one_line_concept_strength minimum
  min_process_score: 6           # construction_process_satisfaction minimum
  criteria:
    - name: "one_line_concept_strength"
      description: "Does the one-line concept make you NEED to watch?"
    - name: "first_second_clarity"
      description: "Is the before-state instantly clear in 1 second?"
    - name: "construction_process_satisfaction"
      description: "Is the build process satisfying to watch in fast-forward?"
    - name: "reveal_satisfaction"
      description: "Does the final reveal deliver a wow moment?"
    - name: "realism_believability"
      description: "Could this actually be built? Does it look real?"
    - name: "luxury_desire"
      description: "Do viewers want this space for themselves?"
    - name: "uniqueness_vs_history"
      description: "Is this unlike previous videos?"
    - name: "loop_rewatch_potential"
      description: "Will viewers watch again or share?"

# ── Categories ───────────────────────────────────────────
categories:
  backyard_excavation:
    label: "Backyard Excavation Transformation"
    target_ratio: 0.12
    examples: ["sunken lounge", "terraced deck", "underground room"]
  underground_container:
    label: "Underground Container Build"
    target_ratio: 0.10
    examples: ["buried container gym", "container cinema", "bunker"]
  hidden_under_pool:
    label: "Hidden Room Under Pool"
    target_ratio: 0.10
    examples: ["pool bottom opens to room", "underwater viewing room"]
  pool_conversion:
    label: "Pool-to-Luxury Conversion"
    target_ratio: 0.10
    examples: ["empty pool to fire pit", "pool to boat lounge"]
  garage_warehouse:
    label: "Garage / Warehouse Luxury Conversion"
    target_ratio: 0.10
    examples: ["garage to office", "warehouse to loft", "bus conversion"]
  rooftop_construction:
    label: "Rooftop Luxury Construction"
    target_ratio: 0.10
    examples: ["rooftop pool", "rooftop zen garden", "rooftop bar"]
  pond_water_feature:
    label: "Pond / Water Feature Build"
    target_ratio: 0.10
    examples: ["koi pond", "swimming pond", "waterfall garden"]
  container_luxury:
    label: "Container Luxury Installation"
    target_ratio: 0.08
    examples: ["container sauna", "stacked container house"]
  narrow_space_build:
    label: "Narrow/Tight Space Build"
    target_ratio: 0.10
    examples: ["alley kitchen", "under-stairs theater", "courtyard roof"]
  exterior_normal_interior_unreal:
    label: "Normal Exterior / Unreal Interior"
    target_ratio: 0.10
    examples: ["bookshelf secret bar", "water tank apartment", "car elevator"]

# ── Construction Types (for dedup) ───────────────────────
construction_types:
  - excavation_and_burial
  - surface_renovation
  - structural_framing
  - container_modification
  - mechanical_installation
  - waterproofing_and_tiling
  - interior_finishing
  - landscape_and_planting
  - demolition_and_rebuild
  - hidden_mechanism_build

# ── Concept Templates ────────────────────────────────────
# "What makes people click" - decided BEFORE specific scenario
concept_templates:
  - id: "dig_and_bury"
    label: "Dig a Hole, Bury Something Amazing"
    description: "Excavate ground, lower/install something unexpected, cover it up"
    key_process: "excavation → lowering → burial → interior reveal"
    satisfaction_driver: "seeing the ground swallow something big"

  - id: "hidden_behind"
    label: "Secret Space Behind Ordinary Surface"
    description: "Normal wall/floor/shelf conceals a luxury space behind it"
    key_process: "mechanism build → hidden door → interior finishing → reveal"
    satisfaction_driver: "the moment the hidden door opens"

  - id: "empty_to_luxury"
    label: "Empty/Ugly Space to Luxury"
    description: "Abandoned or boring space gets fully transformed by construction"
    key_process: "demolition → cleanup → rebuild → luxury finishing"
    satisfaction_driver: "the contrast between before and after"

  - id: "water_creation"
    label: "Create Water Where There Was None"
    description: "Dry land becomes pool/pond/water feature through construction"
    key_process: "excavation → waterproofing → structure → fill with water"
    satisfaction_driver: "the moment water fills the space"

  - id: "stack_and_build_up"
    label: "Stack/Elevate to Create Vertical Space"
    description: "Stacking containers, building upward, creating multi-level"
    key_process: "crane work → stacking → connecting → interior per level"
    satisfaction_driver: "seeing things stack with heavy machinery"

  - id: "convert_vehicle"
    label: "Vehicle/Object Becomes Living Space"
    description: "Bus, container, tank, etc. converted to luxury interior"
    key_process: "gut interior → reframe → insulate → luxury finishing"
    satisfaction_driver: "the absurd transformation of a mundane object"

  - id: "landscape_sculpt"
    label: "Sculpt the Land Into a Feature"
    description: "Reshape terrain into terraces, sunken areas, water features"
    key_process: "earthmoving → grading → hardscaping → planting/finishing"
    satisfaction_driver: "watching earth move and reshape"

  - id: "mechanical_reveal"
    label: "Mechanical/Moving Element Reveals Space"
    description: "Floor slides, wall rotates, roof retracts to reveal hidden area"
    key_process: "mechanism fabrication → installation → concealment → activation"
    satisfaction_driver: "the mechanical reveal moment"

  - id: "tiny_to_grand"
    label: "Impossibly Small Space Becomes Grand"
    description: "Tiny closet/gap/shed becomes surprisingly luxurious inside"
    key_process: "maximize every inch → clever storage → premium materials → lighting"
    satisfaction_driver: "disbelief at how much fits in so little space"

  - id: "natural_integration"
    label: "Build Merging With Nature"
    description: "Construction that integrates water, trees, rock, earth as features"
    key_process: "work around/with natural elements → enhance → blend boundaries"
    satisfaction_driver: "the seamless blend of built and natural"

# ── Camera Styles ────────────────────────────────────────
camera_styles:
  drone_overhead:
    label: "Drone Overhead Timelapse"
    description: "Top-down or angled aerial view of the entire work site"
    traits: "stable hover, wide angle, shows full site progression"
    best_for: ["excavation", "landscape", "pool", "rooftop"]

  fixed_wide:
    label: "Fixed Wide Angle"
    description: "Tripod-mounted wide shot showing the full space"
    traits: "fixed position, everything visible, classic timelapse feel"
    best_for: ["garage", "interior", "container", "narrow_space"]

  walkthrough_reveal:
    label: "Walkthrough Reveal"
    description: "Camera moves through the space at the end for reveal"
    traits: "fixed during construction, slow walkthrough for final reveal"
    best_for: ["hidden_room", "interior", "secret_space"]

  crane_descend:
    label: "Crane/Descend Shot"
    description: "High angle descending into the completed space"
    traits: "starts high showing before, descends into finished space"
    best_for: ["underground", "sunken", "pool", "excavation"]

# ── Dry Run ──────────────────────────────────────────────
dry_run: false

# ── Video Generation (locked behind dry_run) ─────────────
video:
  model: "wan-2.1"
  resolution: "480p"
  max_cost_per_video_usd: 0.35

# ── Output ───────────────────────────────────────────────
output:
  directory: "output"
  filename_prefix: "build"
